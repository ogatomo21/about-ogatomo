<!DOCTYPE html>
<html lang="{{page.htmlLang}}">
<head prefix="og: http://ogp.me/ns#">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{works.pageTitle}}</title>
  <meta name="description" content="{{works.pageDescription}}">
  <link rel="canonical" href="{{page.canonical}}">
  <link rel="alternate" hreflang="ja" href="{{page.hreflangJa}}">
  <link rel="alternate" hreflang="en" href="{{page.hreflangEn}}">
  <link rel="alternate" hreflang="x-default" href="{{page.hreflangJa}}">
  <meta property="og:title" content="{{works.pageTitle}}">
  <meta property="og:description" content="{{works.pageDescription}}">
  <meta property="og:image" content="https://about.ogtm.dev/images/profile-ogp.webp">
  <meta property="og:url" content="{{page.ogUrl}}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{page.ogLocale}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{works.pageTitle}}">
  <meta name="twitter:description" content="{{works.pageDescription}}">
  <meta name="twitter:image" content="https://about.ogtm.dev/images/profile-ogp.webp">
  <meta name="theme-color" content="#7086bd" id="meta-theme-color">
  <link rel="icon" href="./favicon.ico">
  <script>
    (function () {
      try {
        var key = "about-ogatomo-theme";
        var t = localStorage.getItem(key) || "system";
        if (t !== "light" && t !== "dark" && t !== "system") t = "system";
        var dark =
          t === "dark" ||
          (t === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.dataset.theme = t;
        var meta = document.getElementById("meta-theme-color");
        if (meta) meta.setAttribute("content", dark ? "#12141c" : "#7086bd");
      } catch (e) {}
    })();
  </script>
</head>
<body class="min-h-screen bg-page text-text" data-locale="{{page.locale}}" data-page="works">
  <header id="site-header" class="site-header is-visible" aria-hidden="false">
    <div class="site-header-inner" data-header-menu>
      <div class="site-header-bar">
        <a
          href="./index.{{page.locale}}.html"
          class="site-brand"
          data-nav="home"
          data-page-link="home"
        >about.ogatomo</a>
        <button
          type="button"
          class="header-menu-btn"
          data-header-menu-toggle
          aria-expanded="false"
          aria-controls="header-menu-panel"
          data-i18n-attr="aria-label:nav.menuOpen"
          aria-label="{{nav.menuOpen}}"
        >
          <svg class="header-menu-icon header-menu-icon--open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="header-menu-icon header-menu-icon--close" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="header-menu-body" id="header-menu-panel" data-header-menu-panel>
        <nav class="site-header-nav" data-i18n-attr="aria-label:nav.aria" aria-label="{{nav.aria}}">
          <a href="./index.{{page.locale}}.html" class="site-nav-btn" data-nav="home" data-page-link="home" data-i18n="nav.home">{{nav.home}}</a>
          <a href="./works.{{page.locale}}.html" class="site-nav-btn" data-nav="works" data-page-link="works" data-i18n="nav.works" aria-current="page">{{nav.works}}</a>
          <a
            href="https://ogatomo.net/contact"
            target="_blank"
            rel="noopener noreferrer"
            class="site-nav-btn site-nav-btn--primary"
            data-i18n="nav.contact"
          >{{nav.contact}}</a>
        </nav>
        <div class="header-tools">
          <div class="lang-menu" data-lang-menu>
            <button
              type="button"
              class="lang-menu-trigger"
              data-lang-trigger
              aria-expanded="false"
              aria-haspopup="listbox"
              data-i18n-attr="aria-label:langSwitch.aria,title:langSwitch.aria"
              title="{{langSwitch.aria}}"
              aria-label="{{langSwitch.aria}}"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true" class="lang-menu-icon">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                <path d="M3 12h18M12 3c2.5 2.5 3.5 5.5 3.5 9s-1 6.5-3.5 9c-2.5-2.5-3.5-5.5-3.5-9s1-6.5 3.5-9z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </button>
            <ul class="lang-menu-panel" data-lang-panel role="listbox">
              <li>
                <button type="button" role="option" class="lang-menu-option" data-lang-opt="ja" data-i18n="langSwitch.ja" aria-selected="{{page.langJaActive}}">{{langSwitch.ja}}</button>
              </li>
              <li>
                <button type="button" role="option" class="lang-menu-option" data-lang-opt="en" data-i18n="langSwitch.en" aria-selected="{{page.langEnActive}}">{{langSwitch.en}}</button>
              </li>
            </ul>
          </div>
          <div class="theme-switch" role="radiogroup" data-i18n-attr="aria-label:theme.aria" aria-label="{{theme.aria}}">
            <button type="button" class="theme-dot" role="radio" data-theme-opt="system" aria-checked="false" data-i18n-attr="title:theme.system,aria-label:theme.systemAria" title="{{theme.system}}" aria-label="{{theme.systemAria}}">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 20h8M12 16v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <button type="button" class="theme-dot" role="radio" data-theme-opt="light" aria-checked="false" data-i18n-attr="title:theme.light,aria-label:theme.lightAria" title="{{theme.light}}" aria-label="{{theme.lightAria}}">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <button type="button" class="theme-dot" role="radio" data-theme-opt="dark" aria-checked="false" data-i18n-attr="title:theme.dark,aria-label:theme.darkAria" title="{{theme.dark}}" aria-label="{{theme.darkAria}}">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-20">
    <section class="section-pad bg-page" aria-labelledby="works-page-heading">
      <div class="section-inner">
        <p class="mb-3">
          <a href="./index.{{page.locale}}.html" class="text-sm font-medium text-light hover:underline" data-page-link="home" data-i18n="works.backHome">{{works.backHome}}</a>
        </p>
        <h1 id="works-page-heading" class="section-title" data-i18n="works.title">{{works.title}}</h1>
        <p class="section-lead mb-10 sm:mb-12" data-i18n="works.lead">{{works.lead}}</p>
      </div>
      <div
        id="works-full-list"
        class="works-card-grid"
        role="list"
        data-i18n-attr="aria-label:works.listPageAria"
        aria-label="{{works.listPageAria}}"
      >
        <!-- inject:works-all -->
      </div>
      <div class="section-inner">
        <p class="mt-10 text-center text-sm">
          <a href="https://github.com/ogatomo21?tab=repositories" target="_blank" rel="noopener noreferrer" class="font-medium text-light hover:underline" data-i18n="works.githubMore">
            {{works.githubMore}}
          </a>
        </p>
      </div>
    </section>
  </main>

  <footer class="bg-tertiary px-4 py-10 text-center text-sm text-secondary">
    <p class="mb-4 font-medium text-text">&copy; <span id="copyright-year">2026</span> Tomoya Ogawa</p>
    <ul class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2">
      <li><a class="hover:text-primary hover:underline" href="https://ogatomo.net/about/" data-i18n="footer.terms">{{footer.terms}}</a></li>
      <li><a class="hover:text-primary hover:underline" href="https://ogatomo.net/privacy-policy/" data-i18n="footer.privacy">{{footer.privacy}}</a></li>
      <li><a class="hover:text-primary hover:underline" href="https://github.com/ogatomo21/about-ogatomo" data-i18n="footer.github">{{footer.github}}</a></li>
    </ul>
  </footer>
  <script type="module" src="../src/js/main.js"></script>
</body>
</html>
